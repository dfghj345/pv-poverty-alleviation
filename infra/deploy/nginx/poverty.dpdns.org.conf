# Nginx site for poverty.dpdns.org
# Assumptions:
# - Frontend build output is deployed to /var/www/poverty.dpdns.org
# - FastAPI listens on 127.0.0.1:8000 via systemd

upstream pv_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name poverty.dpdns.org;

    root /var/www/poverty.dpdns.org;
    index index.html;

    access_log /var/log/nginx/poverty.dpdns.org.access.log;
    error_log /var/log/nginx/poverty.dpdns.org.error.log warn;

    charset utf-8;
    client_max_body_size 20m;
    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Future HTTPS upgrade:
    # 1. Keep this file as the HTTP entry.
    # 2. Add a separate 443 server block with SSL certs.
    # 3. Replace the block below with: return 301 https://$host$request_uri;

    location /api/ {
        rewrite ^/api/?(.*)$ /$1 break;

        proxy_pass http://pv_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
