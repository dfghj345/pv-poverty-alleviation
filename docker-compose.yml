x-backend-env: &backend-env
  TZ: Asia/Shanghai
  DEBUG: "false"
  SECRET_KEY: ${SECRET_KEY:-change-this-secret-before-production}
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-password_pv_2026}@postgres:5432/${POSTGRES_DB:-pv_poverty_alleviation}
  PIPELINE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-password_pv_2026}@postgres:5432/${POSTGRES_DB:-pv_poverty_alleviation}
  REDIS_URL: redis://redis:6379/0
  CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173","http://poverty.dpdns.org","http://8.139.7.171"]'

x-backend-build: &backend-build
  context: .
  dockerfile: backend/Dockerfile
  args:
    PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    PIP_DEFAULT_TIMEOUT: ${PIP_DEFAULT_TIMEOUT:-180}
    PIP_RETRIES: ${PIP_RETRIES:-10}

services:
  postgres:
    image: postgis/postgis:15-3.3
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password_pv_2026}
      POSTGRES_DB: ${POSTGRES_DB:-pv_poverty_alleviation}
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-pv_poverty_alleviation}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pv_network

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pv_network

  backend:
    build: *backend-build
    restart: unless-stopped
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - pv_network

  data-sync:
    build: *backend-build
    profiles: ["ops"]
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "data_pipeline.run_all_spiders", "--stage", "crawl"]
    restart: "no"
    networks:
      - pv_network

networks:
  pv_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
